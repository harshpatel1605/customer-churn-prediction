Continuous-Deployment:
  needs: build-and-push-ecr-image
  runs-on: self-hosted
  steps:
    - name: Free disk space
      run: |
        echo "Disk usage before cleanup:"
        df -h
        docker system prune -af --volumes
        find /home/ubuntu/actions-runner/_diag -name "*.log" -mtime +7 -delete 2>/dev/null || true
        echo "Disk usage after cleanup:"
        df -h

    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Pull latest images
      run: |
        docker pull ${{ secrets.AWS_ECR_LOGIN_URI }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest

    - name: Stop and remove container if running
      run: |
        docker ps -q --filter "name=Customer_Churn_Prediction" | grep -q . && \
          docker stop Customer_Churn_Prediction && \
          docker rm -fv Customer_Churn_Prediction || true

    - name: Run Docker Image to serve users
      run: |
        docker run -d -p 8080:8080 --name=Customer_Churn_Prediction \
          -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          -e AWS_REGION=${{ secrets.AWS_REGION }} \
          ${{ secrets.AWS_ECR_LOGIN_URI }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest